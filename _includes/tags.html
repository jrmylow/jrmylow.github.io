{% comment %}
  Post Tags Component
  Displays tags for a post as clickable links

  Usage: {% include post-tags.html tags=page.tags %}
{% endcomment %}

{% if include.tags and include.tags.size > 0 %}
<div class="post-tags">
  <span class="post-tags-label">Tags:</span>
  {% for tag in include.tags %}
    <a href="{{ '/tags/#' | append: tag | relative_url }}" class="post-tag">{{ tag }}</a>
  {% endfor %}
</div>
{% endif %}
