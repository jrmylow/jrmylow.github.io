<head>
  <link href="https://gmpg.org/xfn/11" rel="profile">
  <meta http-equiv="content-type" content="text/html; charset=utf-8">

  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% if page.collection == "previews" or page.noindex %}
  <meta name="robots" content="noindex, nofollow">
  {% endif %}

  <title>
    {% if page.title == "Home" %}
      {{ site.title }} &middot; {{ site.tagline }}
    {% else %}
      {{ page.title }} &middot; {{ site.title }}
    {% endif %}
  </title>

  {% if page.url and site.baseurl %}
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  {% endif %}

  <!-- Inline theme script - must run before CSS to prevent flash -->
  <script>
    (function() {
      var theme = localStorage.getItem('theme');
      if (!theme) {
        theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      }
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <link rel="stylesheet" href="{{ '/public/css/lanyon.css' | absolute_url }}">
  <link rel="stylesheet" href="{{ '/public/css/dark-mode.css' | absolute_url }}">
  <link rel="stylesheet" href="{{ '/public/css/monokai.css' | absolute_url }}">
  <link rel="stylesheet" href="{{ '/public/css/cards.css' | absolute_url }}">
  <link rel="stylesheet" href="{{ '/public/css/tags.css' | absolute_url }}">
  <link rel="stylesheet" href="{{ '/public/css/search.css' | absolute_url }}">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=PT+Serif:400,400italic,700%7CPT+Sans:400">

  <link rel="apple-touch-icon-precomposed" sizes="144x144" href="{{ '/public/apple-touch-icon-precomposed.png' | absolute_url }}">
  <link rel="shortcut icon" href="{{ '/public/favicon.ico' | absolute_url }}">

  <link rel="alternate" type="application/rss+xml" title="RSS" href="{{ '/atom.xml' | absolute_url }}">

  <script src="{{ '/public/js/dark-mode.js' | absolute_url }}" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js" defer></script>
  <script src="{{ '/public/js/search.js' | absolute_url }}" defer></script>
  <script src="{{ '/public/js/tag-filter.js' | absolute_url }}" defer></script>
</head>
