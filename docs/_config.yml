# Setup
title:               Jeremy Low
tagline:             'Ruminations...'
description:         'A home for essays. Written by <a href="https://twitter.com/jrmy_low" >@jrmy_low</a>. <br><br>To get in touch, please check out the contact page below.'
disclaimer:          "Opinions my own. I do not speak for my employer, nor yours. None of this is financial advice."
url:                 ''
baseurl:             ''
paginate:            10
paginate_path:       "/essays/all/page/:num/"
permalink:           pretty

# Collections
# `previews` are unlisted, shareable essays: they build at the same permalink a
# post would, but are not in `site.posts`, so they stay out of the essays
# listing, archive, tags, search index, and feed automatically. Promote one to
# a published post by moving the file from _previews/ to _posts/ (same name) --
# the permalink is unchanged.
collections:
  previews:
    output: true
    permalink: /:year/:month/:day/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: previews
    values:
      layout: post

# Include directories
include: ['_pages']

# About/contact
author:
  name:             Jeremy Low
  gh_url:           jrmylow
  tw_url:           jrmy_low
  md_url:           '@jrmylow@mastodon.world'
  email:            hello@jrmylow.com
  hn_url:           jrmylow

# Gems
plugins:
  - jekyll-paginate

kramdown:
  auto_ids: true
  auto_id_stripping: false
  toc_levels: 1..6

# Custom vars
theme_name:          Lanyon
theme_url:           https://lanyon.getpoole.com/
theme_version:       1.1.0
destination: _site
